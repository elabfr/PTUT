# Server
server.port=${PORT:8080}

# PostgreSQL DataSource
spring.datasource.url=${JDBC_DATABASE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/ptut_db}}
spring.datasource.username=${JDBC_DATABASE_USERNAME:${DATABASE_USERNAME:ptut_user}}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:${DATABASE_PASSWORD:motdepasse123}}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# CORS (pour le frontend Vue.js)
spring.mvc.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# JWT
app.jwt.secret=${APP_JWT_SECRET:ptut_local_dev_secret_change_me_please_1234567890}
app.jwt.expiration=86400000

# Upload fichiers
spring.servlet.multipart.max-file-size=${APP_MAX_FILE_SIZE:50MB}
spring.servlet.multipart.max-request-size=${APP_MAX_REQUEST_SIZE:50MB}

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
